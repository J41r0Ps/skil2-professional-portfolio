name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Linter
        working-directory: ./frontend
        run: npm run lint

      - name: Verify build
        working-directory: ./frontend
        run: npm run build

  delivery:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          
      - name: Build and Push Docker image
        working-directory: ./frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/skil2-frontend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skil2-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: delivery
    steps:
      - name: Trigger Azure Webhook to pull new image
        run: curl -X POST ${{ secrets.AZURE_WEBHOOK_URL }}